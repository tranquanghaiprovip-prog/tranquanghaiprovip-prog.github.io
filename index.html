<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A4K14 - Đại Gia Đình</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e1b4b,#312e81);
    overflow-x:hidden;
    color:white;
}

/* INTRO */
#intro{
    position:fixed;
    inset:0;
    background:linear-gradient(135deg,#020617,#1e1b4b,#4c1d95);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    z-index:9999;
}

#intro h1{
    font-size:60px;
    background:linear-gradient(90deg,#38bdf8,#f472b6,#facc15);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:glow 2s infinite alternate;
}

.choose-box{
    margin-top:30px;
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}

.choose{
    padding:15px 25px;
    border:none;
    border-radius:15px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    color:white;
    background:linear-gradient(135deg,#06b6d4,#9333ea);
    transition:0.3s;
}

.choose:hover{
    transform:scale(1.1);
    background:linear-gradient(135deg,#f472b6,#facc15);
}

#msg{
    margin-top:20px;
    color:#facc15;
    font-size:18px;
}

/* MAIN */
header{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

header h2{
    font-size:80px;
    background:linear-gradient(90deg,#38bdf8,#f472b6,#facc15);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

header p{
    max-width:800px;
    margin-top:20px;
    font-size:20px;
    color:#e2e8f0;
}

.nickname{
    margin-top:25px;
    font-size:30px;
    color:#facc15;
    font-weight:bold;
}

/* MEMBERS */
section{
    padding:80px 10%;
}

.title{
    text-align:center;
    font-size:40px;
    margin-bottom:40px;
    color:#f472b6;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
}

.member{
    padding:15px;
    border-radius:15px;
    background:rgba(255,255,255,0.08);
    text-align:center;
    transition:0.3s;
}

.member:hover{
    transform:scale(1.05);
    background:linear-gradient(135deg,#06b6d4,#9333ea);
}

.hidden{
    display:none;
}

/* STAR */
.star{
    position:fixed;
    width:6px;
    height:6px;
    background:white;
    border-radius:50%;
    animation:fly linear infinite;
}

@keyframes fly{
    from{transform:translateY(100vh);}
    to{transform:translateY(-100vh);}
}

@keyframes glow{
    from{text-shadow:0 0 10px #38bdf8;}
    to{text-shadow:0 0 30px #f472b6;}
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <h1>A4K14</h1>
    <p>Chọn đáp án bí mật để vào lớp 😎</p>

    <div class="choose-box">
        <button class="choose" onclick="check('sai')">Boss Đại Ca</button>
        <button class="choose" onclick="check('dung')">Khánh Thư</button>
        <button class="choose" onclick="check('sai')">Hoàng Minh</button>
    </div>

    <div id="msg"></div>
</div>

<!-- MAIN -->
<header>
    <h2>A4K14</h2>

    <p>
        Một đại gia đình gồm 42 thành viên, nơi lưu giữ thanh xuân,
        tình bạn và những kỷ niệm đẹp nhất ✨
    </p>

    <div class="nickname" id="nick">
        Biệt danh lớp trưởng: ❓
    </div>
</header>

<section>
    <h2 class="title">42 Thành Viên</h2>

    <div class="grid" id="list"></div>
</section>

<script>
function check(type){
    let msg = document.getElementById("msg");

    if(type === "dung"){
        document.getElementById("intro").classList.add("hidden");
        document.getElementById("nick").innerText =
            "Biệt danh lớp trưởng: 👑 Khánh Thư";
    } else {
        msg.innerText = "❌ Bạn không phải người của lớp này!";
    }

/* tạo 42 thành viên */
const list = document.getElementById("list");

for(let i = 1; i <= 42; i++){
    const div = document.createElement("div");
    div.className = "member";
    div.innerText = "Thành viên " + i;
    list.appendChild(div);
}

/* sao bay */
for(let i=0;i<80;i++){
    let star=document.createElement("div");
    star.classList.add("star");
    star.style.left=Math.random()*100+"vw";
    star.style.animationDuration=(3+Math.random()*7)+"s";
    document.body.appendChild(star);
}
}
</script>

</body>
</html>
