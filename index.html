<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A4K14 - Kỷ Niệm Thanh Xuân</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Plus Jakarta Sans', sans-serif;
}

body {
    background: #090514;
    overflow-x: hidden;
    color: white;
}

/* HIỆU ỨNG NỀN SAO BAY */
.star {
    position: fixed;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    opacity: 0.5;
    animation: fly linear infinite;
    z-index: 1;
}
@keyframes fly {
    from { transform: translateY(100vh); }
    to { transform: translateY(-100vh); }
}

/* 1. MÀN HÌNH KHÓA (INTRO) */
#intro {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center, #1e1b4b 0%, #090514 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    z-index: 9999;
    transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

#intro.hidden {
    opacity: 0;
    visibility: hidden;
    transform: scale(1.1);
}

.intro-card {
    background: rgba(255, 255, 255, 0.03);
    padding: 40px;
    border-radius: 24px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    max-width: 450px;
    width: 90%;
}

#intro h1 {
    font-size: 48px;
    font-weight: 700;
    letter-spacing: 2px;
    background: linear-gradient(90deg, #38bdf8, #f472b6, #facc15);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
}

#intro p {
    color: #94a3b8;
    font-size: 16px;
    margin-bottom: 30px;
}

.choose-box {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.choose {
    padding: 14px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    color: white;
    background: rgba(255, 255, 255, 0.05);
    transition: all 0.3s ease;
}

.choose:hover {
    background: linear-gradient(135deg, #06b6d4, #9333ea);
    border-color: transparent;
    box-shadow: 0 0 20px rgba(147, 51, 234, 0.4);
    transform: translateY(-2px);
}

#msg {
    margin-top: 20px;
    color: #ef4444;
    font-size: 14px;
    min-height: 20px;
    font-weight: 500;
}

/* 2. MÀN HÌNH CHÍNH (MAIN PAGE) */
#main-page {
    position: relative;
    z-index: 2;
    opacity: 0;
    transform: translateY(40px);
    transition: all 1s ease 0.3s;
}

#main-page.visible {
    opacity: 1;
    transform: translateY(0);
}

header {
    height: 60vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 0 20px;
}

header h2 {
    font-size: 72px;
    font-weight: 700;
    background: linear-gradient(90deg, #6366f1, #a855f7, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

header p {
    max-width: 600px;
    margin-top: 15px;
    font-size: 18px;
    color: #94a3b8;
    line-height: 1.6;
}

.nickname {
    margin-top: 25px;
    padding: 8px 20px;
    background: rgba(250, 204, 21, 0.1);
    border: 1px solid #facc15;
    border-radius: 50px;
    font-size: 16px;
    color: #facc15;
    font-weight: 600;
}

/* SECTION THÀNH VIÊN */
section {
    padding: 40px 5% 100px 5%;
}

.title {
    text-align: center;
    font-size: 32px;
    margin-bottom: 50px;
    font-weight: 700;
    position: relative;
}
.title::after {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 4px;
    background: #a855f7;
    border-radius: 2px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 25px;
}

/* THẺ THÀNH VIÊN SIÊU ĐẸP */
.member {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 20px;
    padding: 25px;
    text-align: center;
    backdrop-filter: blur(5px);
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
}

.member::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(6, 182, 212, 0.1), rgba(147, 51, 234, 0.1));
    opacity: 0;
    transition: 0.4s;
}

.member:hover {
    transform: translateY(-10px);
    border-color: rgba(168, 85, 247, 0.4);
    box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
}

.member:hover::before {
    opacity: 1;
}

/* KHUNG ẢNH */
.avatar-box {
    width: 100px;
    height: 100px;
    margin: 0 auto 15px auto;
    border-radius: 50%;
    padding: 4px;
    background: linear-gradient(135deg, #3b82f6, #ec4899);
    position: relative;
    z-index: 2;
}

.avatar-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    background: #1e1b4b; /* Ảnh lỗi hoặc chưa có sẽ hiện màu nền này */
}

.mem-name {
    font-size: 20px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 5px;
    position: relative;
    z-index: 2;
}

.mem-role {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #38bdf8;
    font-weight: 600;
    margin-bottom: 15px;
    position: relative;
    z-index: 2;
}

.mem-desc {
    font-size: 14px;
    color: #94a3b8;
    line-height: 1.5;
    position: relative;
    z-index: 2;
    min-height: 42px;
}

/* TAG TÍNH CÁCH */
.tag {
    display: inline-block;
    padding: 4px 12px;
    background: rgba(255, 255, 255, 0.07);
    border-radius: 50px;
    font-size: 12px;
    margin-top: 15px;
    color: #e2e8f0;
    position: relative;
    z-index: 2;
}
</style>
</head>

<body>

<!-- HIỆU ỨNG SAO BAY NỀN -->
<div id="star-container"></div>

<!-- 1. MÀN HÌNH KHÓA (INTRO) -->
<div id="intro">
    <div class="intro-card">
        <h1>A4K14</h1>
        <p>Xác minh danh tính người trong nhà để vào lớp phá cỗ nào! 😎</p>

        <div class="choose-box">
            <button class="choose" onclick="check('sai')">Lớp Trưởng Đại Ca</button>
            <button class="choose" onclick="check('dung')">Khánh Thư</button>
            <button class="choose" onclick="check('sai')">Hoàng Minh Đẹp Trai</button>
        </div>

        <div id="msg"></div>
    </div>
</div>

<!-- 2. MÀN HÌNH TRANG CHỦ KỶ NIỆM -->
<div id="main-page">
    <header>
        <h2>A4K14</h2>
        <p>
            Nơi cất giữ những nụ cười rực rỡ nhất của tuổi trẻ. 42 mảnh ghép tạo nên một bức tranh thanh xuân vô giá ✨
        </p>
        <div class="nickname" id="nick">Biệt danh lớp trưởng: ❓</div>
    </header>

    <section>
        <h2 class="title">Gặp Gỡ 42 Thành Viên</h2>
        <div class="grid" id="list"></div>
    </section>
</div>

<script>
// Tạo hiệu ứng sao bay ngẫu nhiên
const starContainer = document.getElementById("star-container");
for(let i = 0; i < 100; i++) {
    let star = document.createElement("div");
    star.classList.add("star");
    star.style.left = Math.random() * 100 + "vw";
    star.style.animationDuration = (3 + Math.random() * 7) + "s";
    star.style.animationDelay = Math.random() * 5 + "s";
    starContainer.appendChild(star);
}

// Dữ liệu mô phỏng tính cách riêng biệt của từng người (Bạn có thể sửa lại theo thực tế lớp mình nhé)
const classData = [
    { name: "Nguyễn Khánh Thư", role: "Lớp Trưởng Quyền Lực", desc: "Bề ngoài thét ra lửa, bên trong ấm áp lo toan cho cả lớp.", tag: "⚡ Trách Nhiệm", img: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150" },
    { name: "Trần Hoàng Minh", role: "Thành Viên", desc: "Cây hài của lớp, chuyên gia đi muộn nhưng điểm số lúc nào cũng cao.", tag: "🤡 Hài Hước", img: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150" },
    { name: "Lê Gia Bảo", role: "Thành Viên", desc: "Trùm công nghệ, máy tính lỗi cứ gọi Bảo là xong hết.", tag: "💻 Geek", img: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=150" },
    { name: "Phạm Thùy Linh", role: "Phó Văn Thể Mỹ", desc: "Hát hay, múa dẻo, văn nghệ của trường không bao giờ vắng mặt.", tag: "🎵 Nghệ Sĩ", img: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=150" },
    { name: "Nguyễn Minh Quân", role: "Thành Viên", desc: "Chàng trai vàng trong làng thể thao, đá bóng siêu đỉnh.", tag: "⚽ Thể Thao", img: "https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=150" },
];

// Hàm kiểm tra đáp án
function check(type) {
    let msg = document.getElementById("msg");

    if (type === "dung") {
        // Hiệu ứng ẩn màn hình khóa mượt mà
        document.getElementById("intro").classList.add("hidden");
        document.getElementById("main-page").classList.add("visible");
        document.getElementById("nick").innerText = "👑 Lớp trưởng: Khánh Thư (Bé bự quyền lực)";
        
        // Render danh sách thành viên đầy đủ
        renderMembers();
    } else {
        msg.innerText = "❌ Sai rồi! Bạn có phải thần dân A4K14 không thế?";
        // Hiệu ứng rung nhẹ dòng thông báo lỗi
        msg.style.animation = "shake 0.3s ease";
        setTimeout(() => msg.style.animation = "", 300);
    }
}

// Hàm khởi tạo danh sách 42 thành viên linh hoạt
function renderMembers() {
    const list = document.getElementById("list");
    list.innerHTML = ""; // Xóa dữ liệu cũ nếu có

    for (let i = 1; i <= 42; i++) {
        const memDiv = document.createElement("div");
        memDiv.className = "member";

        // Lấy dữ liệu mẫu có sẵn, nếu vượt quá 5 người đầu tiên thì tự sinh dữ liệu tự động
        let currentMem = classData[i - 1];
        if (!currentMem) {
            currentMem = {
                name: "Thành viên " + i,
                role: "Mảnh ghép số " + i,
                desc: "Một người đồng đội tuyệt vời, luôn hết mình trong mọi cuộc vui của lớp.",
                tag: "✨ Hòa Đồng",
                img: `https://images.unsplash.com/photo-${1500000000000 + (i*100000)}?w=150` // Ảnh giả định ngẫu nhiên
            };
        }

        // Tạo cấu trúc HTML cho từng chiếc thẻ thành viên
        memDiv.innerHTML = `
            <div class="avatar-box">
                <img src="${currentMem.img}" alt="${currentMem.name}" onerror="this.src='https://placehold.co/150x150/1e1b4b/ffffff?text=A4K14'">
            </div>
            <div class="mem-name">${currentMem.name}</div>
            <div class="mem-role">${currentMem.role}</div>
            <div class="mem-desc">"${currentMem.desc}"</div>
            <div class="tag">${currentMem.tag}</div>
        `;
        
        list.appendChild(memDiv);
    }
}
</script>

</body>
</html>
